services:
  - type: worker
    name: dvsa-slot-monitor
    runtime: docker
    plan: free
    envVars:
      - key: DVSA_USERNAME
        sync: false
      - key: DVSA_PASSWORD
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: WHATSAPP_TO_NUMBER
        sync: false
